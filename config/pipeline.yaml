# Offline preprocessing parameters. Everything here is re-runnable against the raw bags,
# which are the immutable source of truth.

# --- Resampling grid -------------------------------------------------------------------
# Single common grid all streams are resampled onto. Set to match the deployed RL
# policy's control rate (60 Hz on both hardware and in sim) — the actuator net's input
# must be sampled at the same rate the policy actually runs at, not an arbitrary rate
# below the native topic rates. 60 Hz is also comfortably below both native rates
# (joint_states ~125 Hz, controller_state ~87 Hz), so every grid point still lands
# within real bracketing samples (interpolated, not extrapolated).
dataset_rate: 60          # Hz — must match policy control rate (hw + sim)
max_gap_ms: 50             # drop any grid segment whose nearest source sample is > this away

# --- Interpolation per signal family (used by align.py) --------------------------------
# WHY THIS EXISTS: the streams arrive at different, jittery rates (joint_states ~125 Hz,
# controller state ~87 Hz) with independent timestamps. To stack them into one frame we
# resample every signal onto ONE shared grid at `dataset_rate`. "How do we read a signal's
# value at a grid time that falls BETWEEN two real samples?" -> that's what `interp` sets,
# per signal. _resample() in align.py also supports "linear"/"nearest" if a future dataset
# strategy wants them for measured (physically-continuous) signals instead.
#
#   zoh (zero-order hold): value = the last sample at or before the grid time; held as a
#        flat step until the next update. Applied to every signal by operator choice, so
#        every column is reconstructed the same way -- no per-signal reconstruction
#        assumptions baked into the aligned arrays.
interp:
  set_point: zoh
  command: zoh
  process_value: zoh
  process_value_dot: zoh
  error: zoh
  joint_position: zoh
  joint_velocity: zoh
  joint_effort: zoh
  tactile: zoh

# --- Frame stacking --------------------------------------------------------------------
stack_len: 4               # frames per input sample
stack_stride: 1            # 1 = consecutive frames; k = every k-th grid step
# Frame t occupies the LAST 52 elements of X; oldest (t - (stack_len-1)*stride) is first.

# --- Target ----------------------------------------------------------------------------
# Y is the 16 ground-truth joint positions at frame (t + target_horizon).
#   0 = same-step regression (state estimator)
#   1 = next-step prediction (forward / actuator model)  <-- default
target_horizon: 1

# --- Splitting & normalization ---------------------------------------------------------
# Split is BY EPISODE (never by frame) to avoid temporal leakage.
split:
  train: 0.7
  val: 0.15
  test: 0.15
  seed: 0
normalize_on: train        # scaler stats computed on train episodes only

# --- Output ----------------------------------------------------------------------------
# hdf5 (needs h5py) or npz (numpy only). build_dataset.py falls back to npz automatically
# if h5py is unavailable, and warns.
output_format: hdf5

# Extra context columns to carry into aligned tables / dataset (excluded from X/Y).
keep_context:
  joint_velocity: true      # /joint_states.velocity (16)
  joint_effort: true        # /joint_states.effort (16)
  controller_command: true  # controller .command / PWM (13)
  tactile: true             # /rh/tactile electrodes, ff/mf/rf/th x 16 (64)
